<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How posts become stories</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000000;
      --surface: #16181c;
      --accent: #1d9bf0;
      --accent-dim: rgba(29, 155, 240, 0.12);
      --green: #00ba7c;
      --red: #f91880;
      --orange: #ff7a00;
      --text: #e7e9ea;
      --text-secondary: #71767b;
      --border: #2f3336;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 700px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg);
    }
    .stage {
      padding: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .stage.active {
      opacity: 1;
    }
    .stage-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .stage-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: #fff;
      flex-shrink: 0;
    }
    .stage-title {
      font-size: 15px;
      font-weight: 700;
    }
    .stage-desc {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
      margin-left: 44px;
    }
    .visual {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
      min-height: 200px;
      overflow: hidden;
      margin-left: 44px;
    }
    .tweets-flow {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tweet-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: popIn 0.3s ease forwards;
      opacity: 0;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .bucket-label {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 9999px;
      font-size: 12px;
      margin: 2px;
      font-weight: 500;
    }
    .bucket-ai { background: rgba(120, 86, 255, 0.15); color: #7856ff; }
    .bucket-breaking { background: rgba(249, 24, 128, 0.15); color: var(--red); }
    .bucket-tech { background: rgba(29, 155, 240, 0.15); color: var(--accent); }
    .bucket-politics { background: rgba(255, 212, 0, 0.15); color: #ffd400; }
    .bucket-business { background: rgba(0, 186, 124, 0.15); color: var(--green); }
    .bucket-culture { background: rgba(249, 24, 128, 0.15); color: #f91880; }
    .bucket-nearby { background: rgba(255, 122, 0, 0.15); color: var(--orange); }
    .vector-grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
    }
    .vector-cell {
      height: 6px;
      border-radius: 2px;
      animation: vectorPulse 1.5s ease infinite;
    }
    @keyframes vectorPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .cluster-canvas {
      position: relative;
      height: 180px;
    }
    .cluster-point {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .cluster-group {
      position: absolute;
      border: 1.5px dashed;
      border-radius: 50%;
      opacity: 0;
      animation: clusterForm 0.8s ease forwards;
    }
    @keyframes clusterForm {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 0.35; }
    }
    .rank-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rank-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rank-fill {
      height: 20px;
      border-radius: 4px;
      width: 0;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rank-label {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 90px;
    }
    .rank-score {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      min-width: 36px;
    }
    .story-cards {
      display: flex;
      gap: 12px;
      overflow-x: hidden;
      padding: 4px 0;
    }
    .story-card {
      flex-shrink: 0;
      width: 260px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.4s ease;
    }
    .story-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .story-card.headline {
      border-color: var(--accent);
    }
    .story-card-headline {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .story-card-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.45;
    }
    .story-meta {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container" id="container"></div>

  <script>
    const colors = {
      ai: '#7856ff', breaking: '#f91880', tech: '#1d9bf0',
      politics: '#ffd400', business: '#00ba7c', culture: '#f91880', nearby: '#ff7a00'
    };
    const buckets = Object.keys(colors);
    const container = document.getElementById('container');
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function showStage(num, title, desc, visualHTML) {
      const el = document.createElement('div');
      el.className = 'stage';
      el.innerHTML = `
        <div class="stage-header">
          <div class="stage-number">${num}</div>
          <h2 class="stage-title">${title}</h2>
        </div>
        <p class="stage-desc">${desc}</p>
        <div class="visual" id="viz">${visualHTML}</div>
      `;
      container.innerHTML = '';
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('active'));
      return el;
    }

    async function runIngest() {
      const bucketLabels = buckets.map(b =>
        `<span class="bucket-label bucket-${b}">${b.charAt(0).toUpperCase() + b.slice(1)}</span>`
      ).join('');
      showStage(1, 'Ingest',
        'Fetch recent public posts from the X API across seven topic buckets.',
        `<div style="margin-bottom:10px">${bucketLabels}</div><div class="tweets-flow" id="tweets-flow"></div>`
      );
      await sleep(200);
      const flow = document.getElementById('tweets-flow');
      for (let i = 0; i < 75; i++) {
        const dot = document.createElement('div');
        dot.className = 'tweet-dot';
        dot.style.background = colors[buckets[Math.floor(Math.random() * buckets.length)]];
        dot.style.animationDelay = `${i * 18}ms`;
        flow.appendChild(dot);
        await sleep(18);
      }
      await sleep(500);
    }

    async function runPreprocess() {
      showStage(2, 'Preprocess',
        'Normalize text, deduplicate, and extract hashtags and URLs.',
        `<div style="display:flex;gap:16px;align-items:center;justify-content:center;padding:40px 0">
          <div id="pre-count" style="font-size:2.5rem;color:var(--text-secondary);font-weight:700">75</div>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="color:var(--text-secondary)">
            <path d="M5 12h14m-6-6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div id="post-count" style="font-size:2.5rem;color:var(--accent);font-weight:700">&mdash;</div>
        </div>
        <div style="text-align:center;font-size:13px;color:var(--text-secondary)">Raw posts &rarr; Clean, unique posts</div>`
      );
      await sleep(400);
      const post = document.getElementById('post-count');
      for (let i = 75; i >= 52; i -= 3) { post.textContent = i; await sleep(50); }
      post.textContent = '52';
      await sleep(500);
    }

    async function runEmbed() {
      showStage(3, 'Embed',
        'Convert each post into a 1536-dimensional vector with OpenAI embeddings.',
        `<div class="vector-grid" id="vector-grid"></div>
         <div style="text-align:center;margin-top:10px;font-size:13px;color:var(--text-secondary)">text-embedding-3-small &middot; 1536 dimensions</div>`
      );
      await sleep(200);
      const grid = document.getElementById('vector-grid');
      for (let i = 0; i < 192; i++) {
        const cell = document.createElement('div');
        cell.className = 'vector-cell';
        cell.style.background = `hsl(206,82%,${30 + Math.random() * 25}%)`;
        cell.style.animationDelay = `${(i % 24) * 50}ms`;
        grid.appendChild(cell);
      }
      await sleep(2000);
    }

    async function runCluster() {
      showStage(4, 'Cluster',
        'Group semantically similar posts with DBSCAN, then merge on shared URLs or hashtags.',
        '<div class="cluster-canvas" id="cluster-canvas"></div>'
      );
      await sleep(200);
      const canvas = document.getElementById('cluster-canvas');
      const points = [];
      for (let i = 0; i < 52; i++) {
        const pt = document.createElement('div');
        pt.className = 'cluster-point';
        pt.style.background = colors[buckets[Math.floor(Math.random() * buckets.length)]];
        pt.style.left = `${10 + Math.random() * 80}%`;
        pt.style.top = `${10 + Math.random() * 80}%`;
        canvas.appendChild(pt);
        points.push(pt);
      }
      await sleep(800);
      const centers = [{x:15,y:30},{x:42,y:60},{x:68,y:25},{x:82,y:68},{x:30,y:78}];
      points.forEach((p, i) => {
        const c = centers[i % centers.length];
        p.style.left = `${c.x + (Math.random() - 0.5) * 14}%`;
        p.style.top = `${c.y + (Math.random() - 0.5) * 14}%`;
      });
      await sleep(1200);
      const clrVals = Object.values(colors);
      centers.forEach((c, i) => {
        const g = document.createElement('div');
        g.className = 'cluster-group';
        g.style.cssText = `left:${c.x-10}%;top:${c.y-28}%;width:76px;height:76px;border-color:${clrVals[i]};animation-delay:${i*150}ms`;
        canvas.appendChild(g);
      });
      await sleep(1000);
    }

    async function runRank() {
      showStage(5, 'Rank',
        'Score each cluster across four weighted signals.',
        '<div class="rank-bars" id="rank-bars"></div>'
      );
      await sleep(200);
      const bars = document.getElementById('rank-bars');
      const signals = [
        {name:'Engagement',weight:35,color:'#1d9bf0'},
        {name:'Velocity',weight:30,color:'#7856ff'},
        {name:'Recency',weight:20,color:'#00ba7c'},
        {name:'Diversity',weight:15,color:'#ff7a00'}
      ];
      signals.forEach((s, i) => {
        const bar = document.createElement('div');
        bar.className = 'rank-bar';
        bar.innerHTML = `<span class="rank-label">${s.name}</span><div class="rank-fill" id="rf-${i}" style="flex:1;background:${s.color}"></div><span class="rank-score">${s.weight}%</span>`;
        bars.appendChild(bar);
      });
      await sleep(200);
      signals.forEach((s, i) => {
        setTimeout(() => { document.getElementById(`rf-${i}`).style.width = `${s.weight * 2.5}%`; }, i * 200);
      });
      await sleep(1500);
    }

    async function runSummarize() {
      showStage(6, 'Summarize',
        'Generate a headline and summary for each cluster with GPT-4o-mini.',
        '<div class="story-cards" id="story-cards"></div>'
      );
      await sleep(200);
      const cards = document.getElementById('story-cards');
      const stories = [
        {headline:'OpenAI Announces GPT-5 with Enhanced Reasoning',summary:'OpenAI unveiled GPT-5 today, featuring major improvements in multi-step reasoning and multimodal capabilities.',hl:true},
        {headline:'Tech Giants Report Q4 Earnings Beat',summary:'Major tech companies exceeded analyst expectations, driven by strong cloud and AI revenue growth.',hl:false},
      ];
      for (const s of stories) {
        const card = document.createElement('div');
        card.className = `story-card${s.hl ? ' headline' : ''}`;
        card.innerHTML = `<div class="story-card-headline">${s.headline}</div><div class="story-card-summary">${s.summary}</div><div class="story-meta"><span>${(0.5+Math.random()*0.4).toFixed(2)}</span><span>&middot;</span><span>${Math.floor(10+Math.random()*40)}K</span></div>`;
        cards.appendChild(card);
        await sleep(100);
        card.classList.add('visible');
        await sleep(400);
      }
      await sleep(500);
    }

    async function runStore() {
      showStage(7, 'Cache & Serve',
        'Persist stories to Redis. The API serves from cache and refreshes in the background.',
        `<div style="text-align:center;padding:30px 0">
          <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)">GET /api/stories</div>
          <div style="font-size:13px;color:var(--text-secondary)">Stories ready</div>
          <div id="story-count" style="font-size:3rem;color:var(--accent);margin-top:8px;font-weight:700">&mdash;</div>
        </div>`
      );
      await sleep(200);
      const count = document.getElementById('story-count');
      for (let i = 0; i <= 20; i++) { count.textContent = i; await sleep(50); }
      await sleep(600);
    }

    async function loop() {
      while (true) {
        await runIngest();
        await runPreprocess();
        await runEmbed();
        await runCluster();
        await runRank();
        await runSummarize();
        await runStore();
        await sleep(1500);
      }
    }

    loop();
  </script>
</body>
</html>
